app:
  frame_width: 640
  frame_height: 360
  process_fps: 22
  # Число потоков OpenCV (0 = оставить автонастройку OpenCV).
  cv_threads: 0
  # Уровень логов: DEBUG, INFO, WARNING, ERROR (перекрывается переменной окружения LOG_LEVEL).
  log_level: INFO
  # Период строки «пульс»: режим, FPS, счётчики (секунды).
  heartbeat_interval_sec: 5.0

tracking:
  # Выше порог — меньше ложных «людей» на шуме/мелочи (класс COCO id=0 только в YOLO).
  detection_confidence: 0.52
  tracking_timeout_sec: 2.5
  detector_model: "yolo11n.pt"
  detect_every_n_frames: 1
  # В TRACKING можно чаще считать детекцию, в SEARCHING реже для экономии CPU.
  detect_every_n_frames_tracking: 1
  detect_every_n_frames_searching: 2
  detector_input_size: 512
  # Ограничение числа боксов от детектора (уменьшает постобработку на CPU).
  detector_max_detections: 20
  # Отсекаем слишком маленькие/большие и нетипичные по форме боксы (мусор).
  min_bbox_area_ratio: 0.005
  max_bbox_area_ratio: 0.72
  min_aspect_h_w: 0.9
  max_aspect_h_w: 4.0
  yolo_iou: 0.5
  center_tolerance_x: 0.09
  center_tolerance_y: 0.09
  target_area_ratio: 0.60
  zoom_hysteresis: 0.10

ptz:
  pan_gain: 0.58
  tilt_gain: 0.55
  zoom_gain: 0.32
  max_pan_speed: 0.24
  max_tilt_speed: 0.20
  max_zoom_speed: 0.18
  search_pan_speed: 0.06
  search_tilt_speed: 0.035
  search_zoom_out_speed: -0.10
  monitoring_ptz_interval_sec: 0.20

stream:
  input_rtsp: "rtsp://{CAMERA_USERNAME}:{CAMERA_PASSWORD}@{CAMERA_HOST}:554/stream1"
  output_rtsp: "rtsp://127.0.0.1:8554/tracking"
  mediamtx_push_path: "tracking"
  ffmpeg_bin: "ffmpeg"
