name: Build and Push to Docker Hub

on:
  push:
    branches: [ "master" ]
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/camera-tracker

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags and labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            # git tag v1.2.3  ->  :1.2.3  +  :1.2  +  :1
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # master push     ->  :latest
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            # any push        ->  :sha-a1b2c3d
            type=sha,prefix=sha-,format=short
            # master push     ->  :edge
            type=edge,branch=master
          labels: |
            org.opencontainers.image.title=camera-tracker
            org.opencontainers.image.description=PTZ person tracking with YOLO + CUDA
            org.opencontainers.image.vendor=yyatc

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
